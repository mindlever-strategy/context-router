[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ctxrouter"
version = "0.5.0"
description = "Python SDK for Context Router MCP server"
readme = "README.md"
license = {text = "Apache-2.0"}
authors = [
    {name = "MindLever Strategy", email = "context-router@example.com"}
]
keywords = ["mcp", "agents", "sdk", "context-router", "ctxrouter", "ai"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
requires-python = ">=3.10"
dependencies = [
    "mcp>=1.27,<2",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
    "mypy>=1.0",
    "ruff>=0.1",
]

[project.urls]
Homepage = "https://github.com/mindlever-strategy/context-router"
Repository = "https://github.com/mindlever-strategy/context-router"

[tool.hatch.build.targets.wheel]
packages = ["src/context_router"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.mypy]
python_version = "3.10"
strict = true
