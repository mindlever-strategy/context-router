services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: contextrouter
      POSTGRES_PASSWORD: password
      POSTGRES_DB: contextrouter
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U contextrouter -d contextrouter']
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
