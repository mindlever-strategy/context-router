name: Publish Python SDK to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: 'PyPI environment'
        required: true
        default: 'testpypi'
        type: choice
        options:
          - testpypi
          - pypi

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'testpypi' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: |
          cd packages/sdk-python
          python -m build

      - name: Publish to PyPI
        if: inputs.environment == 'pypi' || github.event_name == 'release'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          cd packages/sdk-python
          twine upload dist/*

      - name: Publish to TestPyPI
        if: inputs.environment == 'testpypi'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN }}
        run: |
          cd packages/sdk-python
          twine upload --repository testpypi dist/*

      - name: Verify publication
        run: |
          if [[ "${{ inputs.environment }}" == "pypi" ]]; then
            pip install ctxrouter
            python -c "import context_router; print(f'✅ Successfully installed ctxrouter {context_router.__version__}')"
          fi
