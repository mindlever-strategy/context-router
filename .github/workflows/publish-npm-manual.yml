name: Publish npm (manual)

# Use when Changesets already bumped versions on main but npm publish failed
# (e.g. missing @context-router org). Does not create new version bumps.

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v4

      - name: Verify npm token secret is configured
        run: |
          if [ -z "${{ secrets.NPM_TOKEN }}" ]; then
            echo "::error::Missing GitHub secret NPM_TOKEN in the npm environment."
            echo "Add it at: Settings → Environments → npm → Environment secrets"
            echo "Secret name must be exactly NPM_TOKEN."
            exit 1
          fi
          echo "NPM_TOKEN is configured."
          echo "Token must be npm Classic → Automation (bypasses 2FA)."
          echo "Granular Publish tokens fail in CI with npm error EOTP."

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - run: npm ci
      - run: npm run db:generate
      - run: npm test
      - run: npm run build
      - run: npm run pack:check

      - name: Publish @context-router/mcp-server
        run: npm publish --workspace=@context-router/mcp-server --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @context-router/sdk
        run: npm publish --workspace=@context-router/sdk --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
