name: Release Python SDK

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Expected version in pyproject.toml (optional sanity check)"
        required: false
        type: string
  push:
    tags:
      - "python-v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Node dependencies and build MCP server
        run: |
          npm ci
          npm run db:generate
          npm run build --workspace=@context-router/mcp-server

      - name: Install Python SDK (editable) and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "./packages/sdk-python[dev]"

      - name: Run Python SDK tests
        run: pytest packages/sdk-python -q

      - name: Optional version sanity check
        if: inputs.version != ''
        run: |
          ACTUAL=$(python -c "import tomllib; print(tomllib.load(open('packages/sdk-python/pyproject.toml','rb'))['project']['version'])")
          EXPECTED="${{ inputs.version }}"
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "Version mismatch: pyproject.toml has $ACTUAL, expected $EXPECTED"
            exit 1
          fi

      - name: Build sdist and wheel
        run: |
          pip install build
          python -m build packages/sdk-python

      - name: Verify distribution metadata
        run: pip install twine && twine check packages/sdk-python/dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/sdk-python/dist/
          print-hash: true
