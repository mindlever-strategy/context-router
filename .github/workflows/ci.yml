name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: contextrouter
          POSTGRES_PASSWORD: password
          POSTGRES_DB: contextrouter_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U contextrouter -d contextrouter_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://contextrouter:password@localhost:5432/contextrouter_test
      CONTEXT_ROUTER_OWNER_ID: ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run db:generate
      - run: npm run db:migrate
      - run: npm run format:check
      - run: npm run typecheck
      - run: npm test
      - run: npm run test:integration
      - run: npm run build
      - run: npm run test:mcp
      - run: npm run pack:check
