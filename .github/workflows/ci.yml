name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run db:generate
      - run: npm run build
      - run: npm run typecheck
      - run: npm test
      - run: npm run test:mcp
      - if: matrix.node == 24
        run: npm run format:check
      - if: matrix.node == 24
        run: npm run pack:check

  sqlite-platforms:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run db:generate
      - run: npm run build
      - run: npm run test:local

  postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: contextrouter
          POSTGRES_PASSWORD: password
          POSTGRES_DB: contextrouter_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U contextrouter -d contextrouter_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://contextrouter:password@localhost:5432/contextrouter_test
      STORAGE_ENGINE: postgresql
      CONTEXT_ROUTER_OWNER_ID: ci
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run db:generate
      - run: npm run db:migrate
      - run: npm run test:integration

  python-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: npm ci
      - run: npm run db:generate
      - run: npm run build
      - run: pip install -e "./packages/sdk-python[dev]"
      - run: pytest
        working-directory: packages/sdk-python
