name: Bug report
description: Report reproducible incorrect behavior
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: Do not report security vulnerabilities here; use SECURITY.md.
  - type: input
    id: version
    attributes:
      label: Version
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Include the smallest MCP request or repository that reproduces the issue.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
