name: Feature request
description: Propose a focused improvement
labels: ['enhancement']
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: dropdown
    id: scope
    attributes:
      label: Area
      options:
        - MCP server
        - TypeScript SDK
        - Storage
        - Documentation
        - Python SDK roadmap
    validations:
      required: true
